name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Backend config + module smoke check
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 5000
          FRONTEND_URL: http://localhost:5173
          DEFAULT_CURRENCY: USD
          JWT_SECRET: ci-jwt-secret
          MONGO_URI: mongodb://localhost:27017/bokun_ci
          BOKUN_MOCK_MODE: true
          BOKUN_ACCESS_KEY: mock-access
          BOKUN_SECRET_KEY: mock-secret
          BOKUN_API_KEY: mock-api-key
          PESAPAL_MOCK_MODE: true
          PESAPAL_CONSUMER_KEY: mock-key
          PESAPAL_CONSUMER_SECRET: mock-secret
          PESAPAL_IPN_ID: mock-ipn
          PESAPAL_ALLOW_LOCAL_REDIRECTS: true
        run: |
          node -e "require('./src/config/env'); require('./src/modules/bookings/bookings.service'); require('./src/modules/payments/pesapal/pesapal.service'); console.log('Backend smoke OK');"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
